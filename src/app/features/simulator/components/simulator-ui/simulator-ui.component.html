<div id="ui-panel">
  <h1>MarumaTeria</h1>
  <p>物質・光・熱の相互作用を可視化する科学原理シミュレーター</p>

  <div class="mode-switch">
    <div 
      class="mode-btn" 
      [class.active]="simService.mode() === 'metal'" 
      (click)="changeMode('metal')"
    >金属</div>
    <div 
      class="mode-btn" 
      [class.active]="simService.mode() === 'nonmetal'" 
      (click)="changeMode('nonmetal')"
    >非金属（木・プラ等）</div>
  </div>

  <div class="controls-row" *ngIf="simService.mode() === 'metal'">
    <label class="toggle-label">
      <input type="checkbox" [checked]="simService.showElectrons()" (change)="toggleElectrons($event)">
      自由電子を表示する
    </label>
  </div>
  
  <div id="metal-buttons" class="btn-group" *ngIf="simService.mode() === 'metal'">
    <button class="btn-silver" (click)="shootLight('silver')">
      光を当てる（銀：全て反射） <span style="color:#e0e0e0;">⚪</span>
    </button>
    <button class="btn-gold" (click)="shootLight('gold')">
      光を当てる（金：青を吸収） <span style="color:#ffd700;">🟡</span>
    </button>
    <button class="btn-copper" (click)="shootLight('copper')">
      光を当てる（銅：青・緑を吸収） <span style="color:#b87333;">🟠</span>
    </button>
  </div>

  <div id="nonmetal-buttons" class="btn-group" *ngIf="simService.mode() === 'nonmetal'">
    <button class="btn-silver" (click)="shootLight('nonmetal')">
      光を当てる（白：RGBすべて） <span style="color:#ffffff;">🔦</span>
    </button>
    <button class="btn-red" (click)="shootLight('nonmetal-red')">
      赤い光だけ（波長が長い＝低エネルギー） <span style="color:#ff4444;">🔴</span>
    </button>
    <button class="btn-blue" (click)="shootLight('nonmetal-blue')">
      青い光だけ（波長が短い＝高エネルギー） <span style="color:#4444ff;">🔵</span>
    </button>
  </div>

  <div id="status">{{ simService.statusMessage() }}</div>

  <div class="legend" *ngIf="simService.mode() === 'metal'">
    <div class="legend-item"><div class="dot dot-ion"></div> 原子/陽イオン（エネルギーを吸収すると徐々に熱を帯びる）</div>
    <div class="legend-item"><div class="dot dot-electron"></div> 自由電子（特定のエネルギーで状態が遷移する）</div>
    <div class="legend-item"><div class="dot dot-photon"></div> 光（赤・緑・青の粒子の集まり）</div>
  </div>

  <div class="legend" *ngIf="simService.mode() === 'nonmetal'">
    <div class="legend-item"><div class="dot" style="background:#8b5a2b;"></div> 分子・原子（電子が強く束縛されている）</div>
    <div class="legend-item"><div class="dot dot-photon"></div> 光（内部で吸収され熱として蓄積される）</div>
  </div>
</div>
